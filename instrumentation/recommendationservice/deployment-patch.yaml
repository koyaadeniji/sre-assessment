# Kubernetes deployment patch for the instrumented recommendationservice
# Apply with: kubectl patch deployment recommendationservice -n online-boutique --patch-file deployment-patch.yaml

apiVersion: apps/v1
kind: Deployment
metadata:
  name: recommendationservice
  namespace: online-boutique
spec:
  template:
    spec:
      containers:
        - name: server
          image: sre-assessment/recommendationservice:instrumented
          env:
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://$(NODE_IP):4317"
            - name: OTEL_SERVICE_NAME
              value: "recommendationservice"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.version=1.0.0,deployment.environment=assessment"
            - name: OTEL_PROPAGATORS
              value: "tracecontext,baggage"
            # enable Python auto-instrumentation logging correlation
            - name: OTEL_PYTHON_LOG_CORRELATION
              value: "true"
