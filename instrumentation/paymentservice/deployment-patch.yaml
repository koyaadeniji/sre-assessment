# Kubernetes deployment patch for the instrumented paymentservice
# Apply with: kubectl patch deployment paymentservice -n online-boutique --patch-file deployment-patch.yaml

apiVersion: apps/v1
kind: Deployment
metadata:
  name: paymentservice
  namespace: online-boutique
spec:
  template:
    spec:
      containers:
        - name: server
          image: sre-assessment/paymentservice:instrumented
          env:
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://$(NODE_IP):4317"
            - name: OTEL_SERVICE_NAME
              value: "paymentservice"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.version=1.0.0,deployment.environment=assessment"
            - name: OTEL_PROPAGATORS
              value: "tracecontext,baggage"
