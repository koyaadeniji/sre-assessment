# OpenTelemetry Collector — DaemonSet Agent
# Runs on every node, collects telemetry from local pods + host metrics
# Forwards everything to the central gateway for sampling and export

mode: daemonset

# -- the agent needs hostNetwork to scrape host-level metrics
# and access the node's IP for pod-to-agent communication
hostNetwork: true

image:
  repository: otel/opentelemetry-collector-contrib
  tag: "0.96.0"

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

# make the agent reachable from app pods via the node's IP
# pods send OTLP to NODE_IP:4317
ports:
  otlp:
    enabled: true
    containerPort: 4317
    hostPort: 4317
    protocol: TCP
  otlp-http:
    enabled: true
    containerPort: 4318
    hostPort: 4318
    protocol: TCP

config:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

    # scrape host-level metrics from the node
    # this gives us CPU, memory, disk, network per node
    hostmetrics:
      collection_interval: 30s
      scrapers:
        cpu:
          metrics:
            system.cpu.utilization:
              enabled: true
        memory:
          metrics:
            system.memory.utilization:
              enabled: true
        disk: {}
        filesystem: {}
        network: {}
        load: {}
        processes: {}

  processors:
    # prevent the agent from using too much memory
    # if memory hits 80%, start dropping data — better than OOM
    memory_limiter:
      check_interval: 5s
      limit_mib: 400
      spike_limit_mib: 100

    batch:
      send_batch_size: 1024
      send_batch_max_size: 2048
      timeout: 5s

    # enrich every span/metric/log with k8s metadata
    # this is critical — without it, traces show up in Kibana without pod/namespace info
    k8sattributes:
      auth_type: "serviceAccount"
      passthrough: false
      extract:
        metadata:
          - k8s.pod.name
          - k8s.pod.uid
          - k8s.namespace.name
          - k8s.deployment.name
          - k8s.node.name
          - k8s.container.name
        labels:
          - tag_name: app
            key: app
            from: pod
      pod_association:
        - sources:
            - from: resource_attribute
              name: k8s.pod.ip
        - sources:
            - from: connection

    # add resource info about the node itself
    resourcedetection:
      detectors: [env, system]
      system:
        hostname_sources: ["os"]
      timeout: 5s

  exporters:
    # forward all signals to the gateway — NOT directly to Elastic
    # the gateway handles sampling and final export
    otlp/gateway:
      endpoint: otel-gateway-opentelemetry-collector.online-boutique.svc.cluster.local:4317
      tls:
        insecure: true
      retry_on_failure:
        enabled: true
        initial_interval: 5s
        max_interval: 30s

  extensions:
    health_check:
      endpoint: 0.0.0.0:13133
    zpages:
      endpoint: 0.0.0.0:55679

  service:
    extensions: [health_check, zpages]

    pipelines:
      traces:
        receivers: [otlp]
        processors: [memory_limiter, k8sattributes, resourcedetection, batch]
        exporters: [otlp/gateway]

      metrics:
        receivers: [otlp, hostmetrics]
        processors: [memory_limiter, k8sattributes, resourcedetection, batch]
        exporters: [otlp/gateway]

      logs:
        receivers: [otlp]
        processors: [memory_limiter, k8sattributes, resourcedetection, batch]
        exporters: [otlp/gateway]

    telemetry:
      logs:
        level: info
      metrics:
        address: 0.0.0.0:8888

# need RBAC so the k8sattributes processor can query the k8s API
clusterRole:
  create: true
  rules:
    - apiGroups: [""]
      resources: ["pods", "namespaces", "nodes"]
      verbs: ["get", "watch", "list"]
    - apiGroups: ["apps"]
      resources: ["replicasets", "deployments"]
      verbs: ["get", "watch", "list"]

serviceAccount:
  create: true
