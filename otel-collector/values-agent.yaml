mode: daemonset

hostNetwork: false

image:
  repository: otel/opentelemetry-collector-contrib
  tag: "0.96.0"

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

ports:
  otlp:
    enabled: true
    containerPort: 4317
    hostPort: 4317
    protocol: TCP
  otlp-http:
    enabled: true
    containerPort: 4318
    hostPort: 4318
    protocol: TCP

config:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

    hostmetrics:
      collection_interval: 30s
      scrapers:
        cpu:
          metrics:
            system.cpu.utilization:
              enabled: true
        memory:
          metrics:
            system.memory.utilization:
              enabled: true
        disk: {}
        filesystem: {}
        network: {}
        load: {}
        processes: {}

  processors:
    memory_limiter:
      check_interval: 5s
      limit_mib: 400
      spike_limit_mib: 100

    batch:
      send_batch_size: 1024
      send_batch_max_size: 2048
      timeout: 5s

    k8sattributes:
      auth_type: "serviceAccount"
      passthrough: false
      extract:
        metadata:
          - k8s.pod.name
          - k8s.pod.uid
          - k8s.namespace.name
          - k8s.deployment.name
          - k8s.node.name
          - k8s.container.name
        labels:
          - tag_name: app
            key: app
            from: pod
      pod_association:
        - sources:
            - from: resource_attribute
              name: k8s.pod.ip
        - sources:
            - from: connection

    resourcedetection:
      detectors: [env, system]
      system:
        hostname_sources: ["os"]
      timeout: 5s

  exporters:
    otlp/gateway:
      endpoint: otel-gateway-opentelemetry-collector.online-boutique.svc.cluster.local:4317
      tls:
        insecure: true
      retry_on_failure:
        enabled: true
        initial_interval: 5s
        max_interval: 30s

  extensions:
    health_check:
      endpoint: 0.0.0.0:13133
    zpages:
      endpoint: 0.0.0.0:55679

  service:
    extensions: [health_check, zpages]

    pipelines:
      traces:
        receivers: [otlp]
        processors: [memory_limiter, k8sattributes, resourcedetection, batch]
        exporters: [otlp/gateway]

      metrics:
        receivers: [otlp, hostmetrics]
        processors: [memory_limiter, k8sattributes, resourcedetection, batch]
        exporters: [otlp/gateway]

      logs:
        receivers: [otlp]
        processors: [memory_limiter, k8sattributes, resourcedetection, batch]
        exporters: [otlp/gateway]

    telemetry:
      logs:
        level: info
      metrics:
        level: none

clusterRole:
  create: true
  rules:
    - apiGroups: [""]
      resources: ["pods", "namespaces", "nodes"]
      verbs: ["get", "watch", "list"]
    - apiGroups: ["apps"]
      resources: ["replicasets", "deployments"]
      verbs: ["get", "watch", "list"]

serviceAccount:
  create: true
