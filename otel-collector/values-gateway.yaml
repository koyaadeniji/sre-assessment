mode: deployment

replicaCount: 1

image:
  repository: otel/opentelemetry-collector-contrib
  tag: "0.96.0"

resources:
  limits:
    cpu: "1"
    memory: 1Gi
  requests:
    cpu: 250m
    memory: 256Mi

extraEnvs:
  - name: APM_SECRET_TOKEN
    valueFrom:
      secretKeyRef:
        name: apm-token
        key: token

config:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318
    zipkin:
      endpoint: 0.0.0.0:9411

  processors:
    memory_limiter:
      check_interval: 5s
      limit_mib: 800
      spike_limit_mib: 200

    batch:
      send_batch_size: 2048
      send_batch_max_size: 4096
      timeout: 10s

    tail_sampling:
      decision_wait: 10s
      num_traces: 50000
      expected_new_traces_per_sec: 100
      policies:
        - name: keep-all-errors
          type: status_code
          status_code:
            status_codes:
              - ERROR
        - name: keep-slow-traces
          type: latency
          latency:
            threshold_ms: 2000
        - name: keep-checkout-flow
          type: string_attribute
          string_attribute:
            key: http.target
            values:
              - "/cart/checkout"
              - "/cart"
            enabled_regex_matching: true
        - name: probabilistic-sampling
          type: probabilistic
          probabilistic:
            sampling_percentage: 10

    resource:
      attributes:
        - key: deployment.environment
          value: "assessment"
          action: upsert
        - key: k8s.cluster.name
          value: "minikube"
          action: upsert

  exporters:
    otlphttp/elastic:
      endpoint: "https://apm-server-apm-http.elastic-system.svc.cluster.local:8200"
      tls:
        insecure_skip_verify: true
      headers:
        Authorization: "Bearer ${APM_SECRET_TOKEN}"

  extensions:
    health_check:
      endpoint: 0.0.0.0:13133
    zpages:
      endpoint: 0.0.0.0:55679

  service:
    extensions: [health_check, zpages]

    pipelines:
      traces:
        receivers: [otlp, zipkin]
        processors: [memory_limiter, tail_sampling, resource, batch]
        exporters: [otlphttp/elastic]

      metrics:
        receivers: [otlp]
        processors: [memory_limiter, resource, batch]
        exporters: [otlphttp/elastic]

      logs:
        receivers: [otlp]
        processors: [memory_limiter, resource, batch]
        exporters: [otlphttp/elastic]

    telemetry:
      logs:
        level: info
      metrics:
        level: none

serviceAccount:
  create: true
