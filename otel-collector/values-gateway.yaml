# OpenTelemetry Collector — Gateway (Deployment)
# Central collector that receives from all DaemonSet agents
# Handles tail-based sampling and exports to Elastic APM Server
#
# Why a separate gateway?
# - Tail sampling needs to see ALL spans for a trace before deciding
# - If agents sampled independently, we'd get broken traces
# - Gateway is the single point that has the full picture

mode: deployment

replicaCount: 1

image:
  repository: otel/opentelemetry-collector-contrib
  tag: "0.96.0"

resources:
  limits:
    cpu: "1"
    memory: 1Gi
  requests:
    cpu: 250m
    memory: 256Mi

config:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

    # some services might still emit Zipkin format
    # keeping this open for backward compat — costs nothing
    zipkin:
      endpoint: 0.0.0.0:9411

  processors:
    memory_limiter:
      check_interval: 5s
      limit_mib: 800
      spike_limit_mib: 200

    batch:
      send_batch_size: 2048
      send_batch_max_size: 4096
      timeout: 10s

    # --- this is the key piece ---
    # tail sampling at the gateway means we see the full trace
    # before deciding whether to keep or drop it
    #
    # policy logic:
    #   1. always keep errors (these are what we care about most)
    #   2. always keep slow requests (>2s — something is wrong)
    #   3. always keep checkout/payment flows (business-critical)
    #   4. sample 10% of everything else (keep costs manageable)
    tail_sampling:
      decision_wait: 10s
      num_traces: 50000
      expected_new_traces_per_sec: 100
      policies:
        - name: keep-all-errors
          type: status_code
          status_code:
            status_codes:
              - ERROR
        - name: keep-slow-traces
          type: latency
          latency:
            threshold_ms: 2000
        - name: keep-checkout-flow
          type: string_attribute
          string_attribute:
            key: http.target
            values:
              - "/cart/checkout"
              - "/cart"
            enabled_regex_matching: true
        - name: probabilistic-sampling
          type: probabilistic
          probabilistic:
            sampling_percentage: 10

    # add cluster-level metadata that the agents don't have
    resource:
      attributes:
        - key: deployment.environment
          value: "assessment"
          action: upsert
        - key: k8s.cluster.name
          value: "sre-assessment"
          action: upsert

  exporters:
    # send everything to Elastic APM Server via OTLP
    # APM Server routes signals to the right Elasticsearch indices:
    #   traces → traces-apm-*
    #   metrics → metrics-apm-*
    #   logs → logs-apm-*
    otlp/elastic:
      endpoint: "apm-server-apm-http.elastic-system.svc.cluster.local:8200"
      tls:
        insecure: false
        ca_file: /etc/ssl/certs/elastic-ca.pem
      headers:
        # references the APM secret token from a k8s secret
        # create with: kubectl create secret generic apm-token --from-literal=token=YOUR_TOKEN -n online-boutique
        Authorization: "Bearer ${APM_SECRET_TOKEN}"

# mount the APM secret token as an env var on the gateway pod
extraEnvs:
  - name: APM_SECRET_TOKEN
    valueFrom:
      secretKeyRef:
        name: apm-token
        key: token

# mount the Elastic CA cert so the gateway can verify the APM server's TLS
extraVolumes:
  - name: elastic-ca
    secret:
      secretName: elasticsearch-es-http-ca-internal
extraVolumeMounts:
  - name: elastic-ca
    mountPath: /etc/ssl/certs/elastic-ca.pem
    subPath: ca.crt
    readOnly: true

  extensions:
    health_check:
      endpoint: 0.0.0.0:13133
    zpages:
      endpoint: 0.0.0.0:55679
    pprof:
      endpoint: 0.0.0.0:1777

  service:
    extensions: [health_check, zpages, pprof]

    pipelines:
      # traces get tail sampling — this is why they go through the gateway
      traces:
        receivers: [otlp, zipkin]
        processors: [memory_limiter, tail_sampling, resource, batch]
        exporters: [otlp/elastic]

      # metrics don't need sampling, just enrichment and batching
      metrics:
        receivers: [otlp]
        processors: [memory_limiter, resource, batch]
        exporters: [otlp/elastic]

      # logs get the same treatment as metrics
      logs:
        receivers: [otlp]
        processors: [memory_limiter, resource, batch]
        exporters: [otlp/elastic]

    telemetry:
      logs:
        level: info
      metrics:
        address: 0.0.0.0:8888

serviceAccount:
  create: true
